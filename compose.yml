services:
  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-homolog-1
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: mysql://root:root@database:3306/api_solid
      JWT_SECRET: homolog-secret
    depends_on:
      database:
        condition: service_healthy
    networks:
      - academia-net
    restart: unless-stopped

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-homolog-2
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: mysql://root:root@database:3306/api_solid
      JWT_SECRET: homolog-secret
    depends_on:
      database:
        condition: service_healthy
    networks:
      - academia-net
    restart: unless-stopped

  database:
    image: mysql:8.4
    container_name: db-homolog
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: api_solid
      MYSQL_USER: docker
      MYSQL_PASSWORD: docker
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - academia-net
    restart: unless-stopped

  proxy-reverse:
    image: nginx:1.27-alpine
    container_name: proxy-homolog
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
    networks:
      - academia-net
    restart: unless-stopped

networks:
  academia-net:
    driver: bridge

volumes:
  mysql-data:
